# 🌸 若曦V2 pytest配置
# 测试框架统一配置

[pytest]
# 测试目录
testpaths = tests

# 异步测试支持
asyncio_mode = auto

# 覆盖率配置
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    --code-highlight=yes

# 覆盖率报告（单独运行: pytest --cov）
# addopts = --cov=core --cov-report=html --cov-report=term-missing

# 标记定义
markers =
    unit: 单元测试 (快速，无外部依赖)
    integration: 集成测试 (需要外部服务)
    slow: 慢速测试 (>1秒)
    ai: 需要AI模型API的测试
    db: 需要数据库的测试
    memory: 需要记忆系统的测试

# 测试发现规则
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 忽略目录
norecursedirs = 
    .git
    .local
    __pycache__
    .pytest_cache
    node_modules
    data/logs

# 日志级别
log_cli = true
log_cli_level = INFO
log_cli_format = "[%(asctime)s] %(levelname)s - %(message)s"
log_cli_date_format = %H:%M:%S
log_file = data/logs/pytest.log
log_file_level = DEBUG
log_file_format = "[%(asctime)s] %(levelname)s - %(message)s"
log_file_date_format = %Y-%m-%d %H:%M:%S

# 超时设置
timeout = 30

# 环境变量
env = 
    RUOXI_ENV=testing
    RUOXI_LOG_LEVEL=DEBUG
    RUOXI_DB_TYPE=sqlite
    RUOXI_DB_PATH=data/test.db
