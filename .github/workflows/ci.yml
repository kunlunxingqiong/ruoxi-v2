"""
🌸 若曦V2 - GitHub Actions CI/CD配置
持续集成与自动化部署
"""
name: 🌸 若曦V2 CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # 每天凌晨3点运行检查
    - cron: '0 3 * * *'

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ========== 代码质量检查 ==========
  lint:
    name: 🧹 代码检查
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4
    
    - name: 🐍 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: 📦 安装依赖
      run: |
        pip install flake8 black isort mypy bandit
    
    - name: 🧹 Flake8检查
      run: |
        flake8 core/ platform/ --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: 🎨 Black格式检查
      run: |
        black --check core/ platform/ || true
    
    - name: 📊 isort导入排序
      run: |
        isort --check-only core/ platform/ || true
    
    - name: 🔒 Bandit安全检查
      run: |
        bandit -r core/ platform/ -f json -o bandit-report.json || true
    
    - name: 📤 上传安全报告
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: bandit-report.json

  # ========== Python测试 ==========
  test-python:
    name: 🐍 Python测试
    runs-on: ubuntu-latest
    needs: lint
    
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4
    
    - name: 🐍 设置Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: 📦 安装依赖
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov
    
    - name: 🧪 运行测试
      run: |
        pytest tests/ --cov=core --cov=platform --cov-report=xml --cov-report=html -v
    
    - name: 📤 上传覆盖率报告
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
    
    - name: 📤 上传测试报告
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/

  # ========== 前端测试 ==========
  test-frontend:
    name: ⚛️ 前端测试
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4
    
    - name: ⬢ 设置Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: 📦 安装依赖
      run: |
        cd frontend
        npm ci
    
    - name: 🧪 运行测试
      run: |
        cd frontend
        npm test -- --coverage --watchAll=false || true
    
    - name: 🏗️ 构建检查
      run: |
        cd frontend
        npm run build

  # ========== 类型检查 ==========
  typecheck:
    name: 🔍 类型检查
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4
    
    - name: 🐍 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: 📦 安装依赖
      run: |
        pip install mypy types-aiohttp types-requests
        pip install -r requirements.txt
    
    - name: 🔍 MyPy类型检查
      run: |
        mypy core/ platform/ --ignore-missing-imports || true

  # ========== 文档构建 ==========
  docs:
    name: 📚 文档构建
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4
    
    - name: 🐍 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: 📦 安装依赖
      run: |
        pip install mkdocs mkdocs-material pymdown-extensions
    
    - name: 🏗️ 构建文档
      run: |
        cd docs
        mkdocs build --strict || true
    
    - name: 📤 上传文档
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: docs/site/

  # ========== 安全扫描 ==========
  security:
    name: 🔒 安全扫描
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4
    
    - name: 🔒 运行Trivy扫描
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: 📤 上传安全结果
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  # ========== 发布 ==========
  release:
    name: 🚀 发布检查
    runs-on: ubuntu-latest
    needs: [test-python, test-frontend]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 📊 生成变更日志
      run: |
        git log --pretty=format:"- %s (%h)" --no-merges -20 > CHANGELOG_RECENT.md
        cat CHANGELOG_RECENT.md
    
    - name: 🏷️ 检查版本标签
      run: |
        VERSION=$(grep -oP '(?<=version = \")[^\"]+' pyproject.toml || echo "0.0.0")
        echo "当前版本: $VERSION"
        echo "version=$VERSION" >> $GITHUB_ENV

  # ========== 同步Gitee ==========
  sync-gitee:
    name: 🔄 同步至Gitee
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🔄 推送到Gitee
      uses: wearerequired/git-mirror-action@master
      env:
        SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_KEY }}
      with:
        source-repo: "git@github.com:kunlunxingqiong/ruoxi-v2.git"
        destination-repo: "git@gitee.com:xingqiongclaw_admin/ruoxi-v2.git"
