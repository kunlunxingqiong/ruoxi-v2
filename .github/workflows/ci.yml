# 🌸 若曦V2 - CI/CD 流水线
# 持续集成、测试、代码质量检查
name: 🌸 CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.7.1"

permissions:
  contents: read
  security-events: write

jobs:
  # ==================== 代码质量检查 ====================
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        pip install black isort flake8 mypy bandit safety
        
    - name: Check code formatting (black)
      run: |
        black --check --diff .
      
    - name: Check import sorting (isort)
      run: |
        isort --check-only --diff .
        
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Type check with mypy
      run: |
        mypy core/ models/ --ignore-missing-imports || true
        
    - name: Security scan with bandit
      run: |
        bandit -r . -f json -o bandit-report.json || true
        
    - name: Upload security report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json

  # ==================== 运行测试 ====================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
    - name: Run tests with coverage
      env:
        DATABASE_URL: postgresql://test:test@localhost:5432/test
        REDIS_URL: redis://localhost:6379/0
        TESTING: "true"
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=html \
          --junitxml=junit-test-results.xml
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          junit-test-results.xml
          htmlcov/
          coverage.xml
          
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # ==================== 构建Docker镜像 ====================
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      run: |
        docker build -t ruoxi-v2:latest .
        
    - name: Test Docker image
      run: |
        docker run --rm ruoxi-v2:latest python -c "import platform; print(f'Python {platform.python_version()}')"

  # ==================== 安全扫描 ====================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # ==================== API文档生成 ====================
  docs:
    name: 📚 Generate API Docs
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Generate OpenAPI spec
      run: |
        python -c "
        from platform.backend.main import app
        import json
        from fastapi.openapi.utils import get_openapi

        with open('openapi.json', 'w') as f:
            json.dump(get_openapi(
                title=app.title,
                version=app.version,
                description=app.description,
                routes=app.routes,
            ), f, indent=2)
        "
        
    - name: Upload API docs
      uses: actions/upload-artifact@v4
      with:
        name: openapi-spec
        path: openapi.json

  # ==================== 部署到开发环境 ====================
  deploy-dev:
    name: 🚀 Deploy to Dev
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: development
    
    steps:
    - name: Deploy to development server
      run: |
        echo "Deploying to development environment..."
        # Add deployment steps here
        
  # ==================== 发布 ====================
  release:
    name: 🏷️ Create Release
    runs-on: ubuntu-latest
    needs: [test, build, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Get version
      id: get_version
      run: |
        echo "VERSION=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
        
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.get_version.outputs.VERSION }}
        release_name: 🌸 若曦V2 Release v${{ steps.get_version.outputs.VERSION }}
        body: |
          ## 🌸 若曦V2 健康AI助手
          
          ### 新增功能
          - 全面测试套件 (60+测试用例)
          - Docker容器化部署
          - CI/CD自动化流水线
          - API文档自动生成
          
          ### 完整功能列表
          - ✅ 100+ API端点
          - ✅ WebSocket实时通知
          - ✅ PDF健康报告生成
          - ✅ Docker 8服务栈
          - ✅ Prometheus+Grafana监控
          
          ### 部署
          ```bash
          docker-compose up -d
          ```
          
          访问 http://localhost:8000/docs 查看API文档
        draft: false
        prerelease: false
