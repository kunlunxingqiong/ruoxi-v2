"""
🌸 若曦V2 - Docker Compose开发环境
快速启动本地开发
"""
version: '3.8'

services:
  # ========== PostgreSQL开发数据库 ==========
  postgres-dev:
    image: postgres:16-alpine
    container_name: ruoxi-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ruoxi
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: ruoxi_v2_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ruoxi -d ruoxi_v2_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ruoxi-dev-network

  # ========== Redis开发缓存 ==========
  redis-dev:
    image: redis:7-alpine
    container_name: ruoxi-redis-dev
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ruoxi-dev-network

  # ========== ChromaDB开发环境 ==========
  chroma-dev:
    image: chromadb/chroma:latest
    container_name: ruoxi-chroma-dev
    restart: unless-stopped
    volumes:
      - chroma_dev_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8001
      - CHROMA_SERVER_CORS_ALLOW_ORIGINS="*"
    ports:
      - "8002:8001"
    networks:
      - ruoxi-dev-network

  # ========== MinIO文件存储 (可选) ==========
  minio-dev:
    image: minio/minio:latest
    container_name: ruoxi-minio-dev
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_dev_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ruoxi-dev-network

  # ========== Mailhog邮件测试 ==========
  mailhog:
    image: mailhog/mailhog:latest
    container_name: ruoxi-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - ruoxi-dev-network

# ========== 数据卷 ==========
volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  chroma_dev_data:
    driver: local
  minio_dev_data:
    driver: local

# ========== 网络 ==========
networks:
  ruoxi-dev-network:
    driver: bridge
