"""
🌸 若曦V2 - Docker Compose配置
完整生产环境部署
"""
version: '3.8'

services:
  # ========== PostgreSQL数据库 ==========
  postgres:
    image: postgres:16-alpine
    container_name: ruoxi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ruoxi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ruoxi_secure_password}
      POSTGRES_DB: ${DB_NAME:-ruoxi_v2}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ruoxi} -d ${DB_NAME:-ruoxi_v2}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ruoxi-network

  # ========== Redis缓存 ==========
  redis:
    image: redis:7-alpine
    container_name: ruoxi-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-ruoxi_redis_pass}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ruoxi-network

  # ========== ChromaDB向量数据库 ==========
  chroma:
    image: chromadb/chroma:latest
    container_name: ruoxi-chroma
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8001
      - CHROMA_SERVER_CORS_ALLOW_ORIGINS="*"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ruoxi-network

  # ========== 后端API服务 ==========
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: ruoxi-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-ruoxi}:${DB_PASSWORD:-ruoxi_secure_password}@postgres:5432/${DB_NAME:-ruoxi_v2}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-ruoxi_redis_pass}@redis:6379/0
      - CHROMA_URL=http://chroma:8001
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_here}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ENV=production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    networks:
      - ruoxi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ========== 前端Next.js服务 ==========
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: ruoxi-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ruoxi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========== Nginx反向代理 ==========
  nginx:
    image: nginx:alpine
    container_name: ruoxi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ../logs/nginx:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - ruoxi-network

  # ========== 定时任务调度器 ==========
  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: ruoxi-scheduler
    restart: unless-stopped
    command: python -m core.scheduler.celery_worker
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-ruoxi}:${DB_PASSWORD:-ruoxi_secure_password}@postgres:5432/${DB_NAME:-ruoxi_v2}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-ruoxi_redis_pass}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_here}
    depends_on:
      - postgres
      - redis
    volumes:
      - ../data:/app/data
    networks:
      - ruoxi-network

# ========== 数据卷 ==========
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local

# ========== 网络 ==========
networks:
  ruoxi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
